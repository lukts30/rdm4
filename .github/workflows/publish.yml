on:
  push:
    tags:
      - "v*"
name: Create Release
jobs:
  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download artifact
        uses: dawidd6/action-download-artifact@v19
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: main.yml
          workflow_conclusion: success
          commit: ${{ github.sha }}
      - name: Package
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install libarchive-tools
          mkdir package
          ls -lah
          bsdtar -caf ./package/rdm4-windows-x64.zip rdm4-windows-x64
          bsdtar -caf ./package/rdm4-linux-x64.zip rdm4-linux-x64
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          body: |
            Changes in this Release
            - First Change
            - Second Change
          draft: true
          prerelease: true
          files: |
            ./package/rdm4-windows-x64.zip
            ./package/rdm4-linux-x64.zip
