on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
name: CI
jobs:
  lint:
    name: Lint
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # make sure all code has been formatted with rustfmt
      - name: check rustfmt
        run: cargo fmt -- --check --color always
      # run clippy to verify we have no warnings
      - name: cargo fetch
        run: cargo fetch
      - name: cargo clippy
        run: cargo clippy --tests -- -D warnings
  test:
    name: Test
    strategy:
      matrix:
        name: [windows, linux]
        include:
          - name: linux
            os: ubuntu-latest
            artifact_name: rdm4-bin
            asset_name: rdm4-linux-x64
          - name: windows
            os: windows-latest
            artifact_name: rdm4-bin.exe
            asset_name: rdm4-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: get glTF Validator (Linux)
        if: runner.os == 'Linux'
        run: curl -L https://github.com/KhronosGroup/glTF-Validator/releases/download/2.0.0-dev.3.3/gltf_validator-2.0.0-dev.3.3-linux64.tar.xz | tar xvfJ -
      - name: get glTF Validator (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: curl -L https://github.com/KhronosGroup/glTF-Validator/releases/download/2.0.0-dev.3.3/gltf_validator-2.0.0-dev.3.3-win64.zip > vali.zip && tar xvfJ vali.zip
      - name: get texconv (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          curl.exe -O -L https://github.com/microsoft/DirectXTex/releases/download/apr2021/texconv.exe
          pwd | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: cargo fetch
        run: cargo fetch --locked
      - name: cargo test build
        run: cargo build --tests --release --workspace --locked
      - name: cargo test
        run: cargo test --release --workspace --locked
      - name: cargo build release
        run: cargo build --release --workspace --locked
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.artifact_name }}
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: rdm4-linux-x64
          path: ./rdm4-linux-x64
      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rdm4-windows-x64
          path: ./rdm4-windows-x64
      - name: Package
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install libarchive-tools
          mkdir package
          ls -lah
          bsdtar -caf ./package/rdm4-windows-x64.zip rdm4-windows-x64
          bsdtar -caf ./package/rdm4-linux-x64.zip rdm4-linux-x64
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Changes in this Release
            - First Change
            - Second Change
          draft: true
          prerelease: true
          files: |
            ./package/rdm4-windows-x64.zip
            ./package/rdm4-linux-x64.zip
